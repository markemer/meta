name: "Fast Forward Forks"
on:
  workflow_dispatch:
  schedule:
  - cron: "15 * * * *"

jobs:
  ff_mp:
    name: Fast Forward Macports
    runs-on: ubuntu-latest
    steps:
    - name: Merge Macports Ports Upstream
      uses: rohrwerkzeuge/upstream-updates@5cf0a1a84841648d654a489eff07e88a08e38094 # 1.4.0
      with:
        repo: 'macports-ports'
        op-token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        branch: 'master'
    - name: Merge Macports Base Upstream
      uses: rohrwerkzeuge/upstream-updates@5cf0a1a84841648d654a489eff07e88a08e38094 # 1.4.0
      with:
        repo: 'macports-base'
        op-token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        branch: 'master'
